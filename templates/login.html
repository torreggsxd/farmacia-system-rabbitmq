<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Iniciar sesión - Farmacia</title>

    <link rel="icon" href="data:,">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        rel="stylesheet"
    >
</head>

<body class="bg-light">

    <main
        class="container min-vh-100
        d-flex justify-content-center
        align-items-center"
    >
        <div
            class="card border-0 shadow"
            style="width: 100%; max-width: 420px;"
        >
            <div class="card-body p-4">

                <div class="text-center mb-4">
                    <div class="display-5 text-primary">
                        <i class="bi bi-capsule-pill"></i>
                    </div>

                    <h1 class="h4 mt-2 mb-1">
                        Sistema de Farmacia
                    </h1>

                    <p class="text-muted mb-0">
                        Acceso para trabajadores
                    </p>
                </div>

                <form id="form-login">

                    <div class="mb-3">
                        <label
                            for="correo"
                            class="form-label"
                        >
                            Correo electrónico
                        </label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-envelope"></i>
                            </span>

                            <input
                                type="email"
                                id="correo"
                                class="form-control"
                                placeholder="empleado@farmacia.com"
                                autocomplete="username"
                                required
                            >
                        </div>
                    </div>

                    <div class="mb-3">
                        <label
                            for="contrasena"
                            class="form-label"
                        >
                            Contraseña
                        </label>

                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-lock"></i>
                            </span>

                            <input
                                type="password"
                                id="contrasena"
                                class="form-control"
                                placeholder="Contraseña"
                                autocomplete="current-password"
                                required
                            >

                            <button
                                type="button"
                                class="btn btn-outline-secondary"
                                id="btn-mostrar-contrasena"
                                aria-label="Mostrar contraseña"
                            >
                                <i
                                    class="bi bi-eye"
                                    id="icono-contrasena"
                                ></i>
                            </button>
                        </div>
                    </div>

                    <button
                        type="submit"
                        id="btn-ingresar"
                        class="btn btn-primary w-100"
                    >
                        <i class="bi bi-box-arrow-in-right"></i>
                        Ingresar
                    </button>

                    <div
                        id="mensaje"
                        class="mt-3"
                    ></div>

                </form>
            </div>
        </div>
    </main>

    <script>
        (() => {
            const formulario =
                document.getElementById(
                    "form-login"
                );

            const botonIngresar =
                document.getElementById(
                    "btn-ingresar"
                );

            const mensaje =
                document.getElementById(
                    "mensaje"
                );

            const campoContrasena =
                document.getElementById(
                    "contrasena"
                );

            const botonMostrar =
                document.getElementById(
                    "btn-mostrar-contrasena"
                );

            const icono =
                document.getElementById(
                    "icono-contrasena"
                );

            botonMostrar.addEventListener(
                "click",
                function () {
                    const estaOculta =
                        campoContrasena.type ===
                        "password";

                    campoContrasena.type =
                        estaOculta
                            ? "text"
                            : "password";

                    icono.className =
                        estaOculta
                            ? "bi bi-eye-slash"
                            : "bi bi-eye";
                }
            );

            formulario.addEventListener(
                "submit",
                autenticar
            );

            async function autenticar(evento) {
                evento.preventDefault();

                const correo =
                    document
                        .getElementById("correo")
                        .value
                        .trim();

                const contrasena =
                    campoContrasena.value;

                mensaje.innerHTML = "";
                botonIngresar.disabled = true;

                botonIngresar.innerHTML = `
                    <span
                        class="spinner-border
                        spinner-border-sm"
                    ></span>
                    Verificando...
                `;

                try {
                    const respuesta =
                        await fetch(
                            "/api/login",
                            {
                                method: "POST",

                                headers: {
                                    "Content-Type":
                                        "application/json"
                                },

                                body: JSON.stringify({
                                    correo,
                                    contrasena
                                })
                            }
                        );

                    const resultado =
                        await leerRespuesta(
                            respuesta
                        );

                    if (!respuesta.ok) {
                        throw new Error(
                            resultado.message ||
                            resultado.error ||
                            "No fue posible iniciar sesión"
                        );
                    }

                    if (
                        !resultado.token ||
                        !resultado.id_usuario
                    ) {
                        throw new Error(
                            "El servidor no devolvió " +
                            "una sesión válida"
                        );
                    }

                    localStorage.setItem(
                        "token",
                        resultado.token
                    );

                    localStorage.setItem(
                        "usuario",
                        JSON.stringify({
                            id: resultado.id_usuario,
                            nombre:
                                resultado.nombre,
                            rol:
                                resultado.rol
                        })
                    );

                    mensaje.innerHTML = `
                        <div
                            class="alert
                            alert-success mb-0"
                        >
                            <i
                                class="bi
                                bi-check-circle"
                            ></i>
                            Inicio de sesión correcto
                        </div>
                    `;

                    window.location.replace(
                        "/sistema"
                    );

                } catch (error) {
                    console.error(
                        "Error de autenticación:",
                        error
                    );

                    mensaje.innerHTML = `
                        <div
                            class="alert
                            alert-danger mb-0"
                        >
                            <i
                                class="bi
                                bi-exclamation-triangle"
                            ></i>
                            ${escaparHTML(
                                error.message
                            )}
                        </div>
                    `;

                } finally {
                    botonIngresar.disabled = false;

                    botonIngresar.innerHTML = `
                        <i
                            class="bi
                            bi-box-arrow-in-right"
                        ></i>
                        Ingresar
                    `;
                }
            }

            async function leerRespuesta(
                respuesta
            ) {
                const texto =
                    await respuesta.text();

                if (!texto) {
                    return {};
                }

                try {
                    return JSON.parse(texto);

                } catch {
                    return {
                        error: texto
                    };
                }
            }

            function escaparHTML(texto) {
                return String(texto)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }
        })();
    </script>

</body>
</html>
