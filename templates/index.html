<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Sistema de Farmacia</title>

    <!-- Evita la petición protegida a /favicon.ico -->
    <link rel="icon" href="data:,">

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Bootstrap Icons -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"

    <style>
        :root {
            --sidebar-width: 280px;
            --sidebar-color: #212529;
            --sidebar-hover: #343a40;
            --sidebar-accent: #0dcaf0;
            --page-background: #f4f6f9;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
            margin: 0;
        }

        body {
            background: var(--page-background);
            overflow-x: hidden;
        }

        .app-layout {
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: var(--sidebar-width);
            background: var(--sidebar-color);
            color: white;
            padding: 22px 18px;
            overflow-y: auto;
            z-index: 1000;
        }

        .sidebar-brand {
            color: var(--sidebar-accent);
            font-size: 1.55rem;
            font-weight: 700;
            padding: 10px 14px 22px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            margin-bottom: 18px;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 13px;
            width: 100%;
            color: #f8f9fa;
            text-decoration: none;
            padding: 11px 14px;
            border-radius: 7px;
            transition:
                background-color 0.2s,
                color 0.2s,
                transform 0.2s;
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background: var(--sidebar-hover);
            color: var(--sidebar-accent);
            transform: translateX(3px);
        }

        .sidebar-link i {
            width: 20px;
            font-size: 1.05rem;
        }

        .sidebar-session {
            margin-top: 26px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.12);
        }

        .main-wrapper {
            min-height: 100vh;
            margin-left: var(--sidebar-width);
        }

        .topbar {
            background: white;
            min-height: 76px;
            padding: 14px 30px;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .user-info {
            text-align: right;
        }

        .user-name {
            font-weight: 700;
            color: #212529;
        }

        .user-role {
            color: #6c757d;
            font-size: 0.9rem;
        }

        .main-content {
            padding: 34px;
        }

        .welcome-card {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 10px;
            padding: 35px;
            box-shadow: 0 0.15rem 0.5rem rgba(0, 0, 0, 0.06);
        }

        .mobile-menu-button {
            display: none;
        }

        @media (max-width: 992px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.25s ease;
            }

            .sidebar.visible {
                transform: translateX(0);
            }

            .main-wrapper {
                margin-left: 0;
            }

            .mobile-menu-button {
                display: inline-flex;
            }

            .main-content {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="app-layout">

        <!-- ==================================================
             MENÚ LATERAL
        =================================================== -->
        <aside class="sidebar" id="sidebar">

            <div class="sidebar-brand">
                <i class="bi bi-capsule-pill"></i>
                Farmacia 
            </div>

            <nav class="sidebar-menu">

                <a
                    href="#"
                    class="sidebar-link"
                    onclick="
                        event.preventDefault();
                        seleccionarMenu(this);
                        app.cargarTabla('categoria');
                    "
                >
                    <i class="bi bi-tags"></i>
                    Categoría
                </a>

                <a
                    href="#"
                    class="sidebar-link"
                    onclick="
                        event.preventDefault();
                        seleccionarMenu(this);
                        app.cargarTabla('cliente');
                    "
                >
                    <i class="bi bi-people"></i>
                    Cliente
                </a>

                <a
                    href="#"
                    class="sidebar-link"
                    onclick="
                        event.preventDefault();
                        seleccionarMenu(this);
                        app.cargarTabla('detalle_venta');
                    "
                >
                    <i class="bi bi-receipt-cutoff"></i>
                    Detalle Venta
                </a>

                <a
                    href="#"
                    class="sidebar-link"
                    onclick="
                        event.preventDefault();
                        seleccionarMenu(this);
                        app.cargarTabla('factura');
                    "
                >
                    <i class="bi bi-file-earmark-text"></i>
                    Factura
                </a>

                <a
                    href="#"
                    class="sidebar-link"
                    id="menu-producto"
                    onclick="
                        event.preventDefault();
                        seleccionarMenu(this);
                        app.cargarTabla('producto');
                    "
                >
                    <i class="bi bi-box-seam"></i>
                    Producto
                </a>

                <a
                    href="#"
                    class="sidebar-link"
                    onclick="
                        event.preventDefault();
                        seleccionarMenu(this);
                        app.cargarTabla('proveedor');
                    "
                >
                    <i class="bi bi-truck"></i>
                    Proveedor
                </a>

                <a
                    href="#"
                    class="sidebar-link"
                    data-admin-only="true"
                    onclick="
                        event.preventDefault();
                        seleccionarMenu(this);
                        app.cargarTabla('usuario');
                    "
                >
                    <i class="bi bi-person-badge"></i>
                    Usuario
                </a>

                <a
                    href="#"
                    class="sidebar-link"
                    onclick="
                        event.preventDefault();
                        seleccionarMenu(this);
                        app.cargarTabla('venta');
                    "
                >
                    <i class="bi bi-cart"></i>
                    Venta
                </a>

                <a
                    href="#"
                    class="sidebar-link"
                    onclick="
                        event.preventDefault();
                        seleccionarMenu(this);
                        app.cargarTabla('fallecido');
                    "
                >
                    <i class="bi bi-clipboard-x"></i>
                    Fallecido
                </a>

            </nav>

            <div class="sidebar-session">

                <div class="mb-3 px-2">
                    <div
                        id="sidebar-nombre-usuario"
                        class="fw-bold"
                    >
                        Usuario
                    </div>

                    <div
                        id="sidebar-rol-usuario"
                        class="small text-secondary"
                    >
                        Rol
                    </div>
                </div>

                <button
                    type="button"
                    class="btn btn-outline-danger w-100"
                    onclick="cerrarSesion()"
                >
                    <i class="bi bi-box-arrow-right"></i>
                    Cerrar sesión
                </button>

            </div>
        </aside>


        <!-- ==================================================
             CONTENIDO PRINCIPAL
        =================================================== -->
        <div class="main-wrapper">

            <header class="topbar">

                <div class="d-flex align-items-center gap-3">

                    <button
                        type="button"
                        class="btn btn-outline-secondary mobile-menu-button"
                        onclick="alternarMenu()"
                    >
                        <i class="bi bi-list"></i>
                    </button>

                    <div>
                        <h1 class="h5 mb-0">
                            Sistema de Farmacia
                        </h1>

                        <small class="text-muted">
                            Administración general
                        </small>
                    </div>
                </div>

                <div class="user-info">
                    <div
                        id="nombre-usuario"
                        class="user-name"
                    >
                        Usuario
                    </div>

                    <div
                        id="rol-usuario"
                        class="user-role"
                    >
                        Rol
                    </div>
                </div>

            </header>


            <main class="main-content">

                <!-- app.js inserta aquí las tablas y formularios -->
                <section id="content">

                    <div class="welcome-card text-center">

                        <div class="display-4 text-primary mb-3">
                            <i class="bi bi-capsule-pill"></i>
                        </div>

                        <h2 class="h3">
                            Bienvenido al sistema
                        </h2>

                        <p class="text-muted mb-0">
                            Selecciona una opción del menú lateral.
                        </p>

                    </div>

                </section>

            </main>
        </div>
    </div>


    <!-- ==================================================
         INTERCEPTOR JWT
         DEBE ESTAR ANTES DE LOS ARCHIVOS JAVASCRIPT
    =================================================== -->
    <script>
        (() => {
            const tokenActual =
                localStorage.getItem("token");

            if (!tokenActual) {
                window.location.replace("/login");
                return;
            }

            if (window.fetchConJWTConfigurado) {
                return;
            }

            window.fetchConJWTConfigurado = true;

            const fetchOriginal =
                window.fetch.bind(window);

            window.fetch = async function (
                recurso,
                opciones = {}
            ) {
                const token =
                    localStorage.getItem("token");

                const encabezados =
                    new Headers(
                        opciones.headers || {}
                    );

                if (token) {
                    encabezados.set(
                        "Authorization",
                        "Bearer " + token
                    );
                }

                const respuesta =
                    await fetchOriginal(
                        recurso,
                        {
                            ...opciones,
                            headers: encabezados
                        }
                    );

                if (
                    respuesta.status === 401 ||
                    respuesta.status === 422
                ) {
                    console.error(
                        "El servidor rechazó la sesión:",
                        respuesta.status
                    );

                    localStorage.removeItem("token");
                    localStorage.removeItem("usuario");

                    window.location.replace("/login");
                }

                return respuesta;
            };

            console.log(
                "Interceptor JWT preparado correctamente"
            );
        })();
    </script>


    <!-- ==================================================
         ARCHIVOS DEL SISTEMA
         NO CAMBIAR ESTE ORDEN
    =================================================== -->
    <script
        src="{{ url_for('static', filename='app.js') }}?v=70"
    ></script>

    <script

    <script

    <!-- Bootstrap JavaScript -->
    <script

    ></script>


    <!-- ==================================================
         FUNCIONES GENERALES DE INTERFAZ
    =================================================== -->
    <script>
        (() => {
            function obtenerUsuarioGuardado() {
                const textoUsuario =
                    localStorage.getItem("usuario");

                if (!textoUsuario) {
                    return null;
                }

                try {
                    return JSON.parse(textoUsuario);
                } catch (error) {
                    console.error(
                        "No fue posible leer el usuario:",
                        error
                    );

                    return null;
                }
            }

            function colocarTexto(id, texto) {
                const elemento =
                    document.getElementById(id);

                if (elemento) {
                    elemento.textContent = texto;
                }
            }

            function cargarDatosUsuario() {
                const usuario =
                    obtenerUsuarioGuardado();

                if (!usuario) {
                    return;
                }

                const nombre =
                    usuario.nombre || "Usuario";

                const rol =
                    usuario.rol || "Empleado";

                colocarTexto(
                    "nombre-usuario",
                    nombre
                );

                colocarTexto(
                    "rol-usuario",
                    rol
                );

                colocarTexto(
                    "sidebar-nombre-usuario",
                    nombre
                );

                colocarTexto(
                    "sidebar-rol-usuario",
                    rol
                );

                const esAdministrador =
                    rol.toLowerCase() ===
                    "administrador";

                document
                    .querySelectorAll(
                        "[data-admin-only='true']"
                    )
                    .forEach(elemento => {
                        elemento.style.display =
                            esAdministrador
                                ? ""
                                : "none";
                    });
            }

            window.cerrarSesion = function () {
                localStorage.removeItem("token");
                localStorage.removeItem("usuario");

                window.location.replace("/login");
            };

            window.seleccionarMenu = function (
                elementoSeleccionado
            ) {
                document
                    .querySelectorAll(".sidebar-link")
                    .forEach(elemento => {
                        elemento.classList.remove(
                            "active"
                        );
                    });

                if (elementoSeleccionado) {
                    elementoSeleccionado.classList.add(
                        "active"
                    );
                }

                const sidebar =
                    document.getElementById("sidebar");

                if (
                    sidebar &&
                    window.innerWidth <= 992
                ) {
                    sidebar.classList.remove(
                        "visible"
                    );
                }
            };

            window.alternarMenu = function () {
                const sidebar =
                    document.getElementById("sidebar");

                if (sidebar) {
                    sidebar.classList.toggle(
                        "visible"
                    );
                }
            };

            cargarDatosUsuario();

            /*
             * Cargar una tabla inicial cuando todos los scripts
             * hayan terminado de cargarse.
             */
            window.addEventListener(
                "load",
                function () {
                    const menuProducto =
                        document.getElementById(
                            "menu-producto"
                        );

                    if (menuProducto) {
                        menuProducto.classList.add(
                            "active"
                        );
                    }

                    if (
                        typeof app !== "undefined" &&
                        typeof app.cargarTabla ===
                            "function"
                    ) {
                        app.cargarTabla("producto");
                    } else {
                        console.error(
                            "No fue posible encontrar app.cargarTabla"
                        );
                    }
                }
            );
        })();
    </script>
